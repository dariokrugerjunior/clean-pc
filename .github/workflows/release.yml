name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build executaveis SEA
        run: npm run build:sea:all

      - name: Verificar clean-pc-win-x64.exe
        run: .\clean-pc-win-x64.exe --version
        shell: pwsh

      - name: Verificar clean-pc-win-x86.exe
        run: .\clean-pc-win-x86.exe --version
        shell: pwsh

      - name: Publicar release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clean-pc-win-x64.exe
            clean-pc-win-x86.exe
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
